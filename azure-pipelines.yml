trigger:
- main

parameters:
- name: targetEnv
  type: string
  default: dev
  values:
  - dev
  - prod

- name: azureServiceConnection
  type: string
  default: Azure-Service-Connection-Sub

variables:
# DEV
- ${{ if eq(parameters.targetEnv, 'dev') }}:
  - group: variable_iScalaArchive
  - name: resourceGroupName
    value: rg-iscala-archive-dev
  - name: logicAppName
    value: la-iscala-archive-dev
  - name: triggerName
    value: When_HTTP_is_called
  - name: storageAccount
    value: stiscalasnapshotdev
  - name: functionAppName
    value: fa-iscala-eg-proxy-dev
  - name: eventSubscriptionName
    value: evgd-iscala-archive-dev
  - name: rgLocation
    value: swedencentral
  - name: deadLetterStorageAccountName
    value: stiscalasnapshotdev
  - name: keyVaultName
    value: kv-iscala-archive-dev
  - name: connectionsParametersFile
    value: infra/parameters/connections.dev.json
  - name: logicAppParametersFile
    value: infra/parameters/logicapp.dev.json
  - name: functionAppParametersFile
    value: infra/parameters/functionapp.dev.json

# PROD
- ${{ if eq(parameters.targetEnv, 'prod') }}:
  - group: variable_iScalaArchive-prod
  - name: resourceGroupName
    value: rg-iscala-archive-prod
  - name: logicAppName
    value: la-iscala-archive-prod
  - name: triggerName
    value: When_HTTP_is_called
  - name: storageAccount
    value: stiscalasnapshotprod
  - name: functionAppName
    value: fa-iscala-eg-proxy-prod
  - name: eventSubscriptionName
    value: evgd-iscala-archive-prod
  - name: rgLocation
    value: swedencentral
  - name: deadLetterStorageAccountName
    value: stiscalasnapshotprod
  - name: keyVaultName
    value: kv-iscala-archive-prod
  - name: connectionsParametersFile
    value: infra/parameters/connections.prod.json
  - name: logicAppParametersFile
    value: infra/parameters/logicapp.prod.json
  - name: functionAppParametersFile
    value: infra/parameters/functionapp.prod.json

- name: deploymentPrincipalObjectId
  value: 94f97b9f-b688-4f99-a3ff-64e0e8a945d8

- name: storageAccountResourceId
  value: /subscriptions/$(subscriptionId)/resourceGroups/$(resourceGroupName)/providers/Microsoft.Storage/storageAccounts/$(storageAccount)

stages:
- stage: Deploy
  displayName: Deploy ${{ parameters.targetEnv }}
  jobs:

  - ${{ if eq(parameters.targetEnv, 'dev') }}:
    - job: DeployDev
      displayName: Deploy DEV
      pool:
        name: easec-pool
      steps:
      - checkout: self

      - bash: |
          set -e
          python3 -m json.tool infra/functionapp.json > /dev/null
          python3 -m json.tool infra/connections.json > /dev/null
          python3 -m json.tool infra/workbook-forwarding.json > /dev/null
          python3 -m json.tool infra/deadletter-container.json > /dev/null
          python3 -m json.tool infra/eventgrid-subscription.json > /dev/null
          python3 -m json.tool infra/keyvault.json > /dev/null
          python3 -m json.tool logicapp/logicapp.json > /dev/null
          python3 -m json.tool infra/parameters/logicapp.dev.json > /dev/null
          python3 -m json.tool infra/parameters/logicapp.prod.json > /dev/null
          python3 -m json.tool infra/parameters/functionapp.dev.json > /dev/null
          python3 -m json.tool infra/parameters/functionapp.prod.json > /dev/null
        displayName: Validate JSON templates

      - task: AzureCLI@2
        displayName: Set subscriptionId variable
        inputs:
          azureSubscription: ${{ parameters.azureServiceConnection }}
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -euo pipefail
            echo "##vso[task.setvariable variable=subscriptionId]$(az account show --query id -o tsv)"

      - task: AzureCLI@2
        displayName: HARD GUARDRAILS (dev)
        inputs:
          azureSubscription: ${{ parameters.azureServiceConnection }}
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -euo pipefail

            ENV="${{ parameters.targetEnv }}"
            RG="$(resourceGroupName)"
            LA="$(logicAppName)"
            FUNC="$(functionAppName)"
            ST="$(storageAccount)"
            EG="$(eventSubscriptionName)"
            KV="$(keyVaultName)"

            fail() { echo "ERROR: $*" >&2; exit 1; }

            [ "$ENV" = "dev" ] || fail "Expected targetEnv=dev, got: $ENV"
            [ "$RG" = "rg-iscala-archive-dev" ] || fail "DEV must use RG rg-iscala-archive-dev, got: $RG"
            [ "$ST" = "stiscalasnapshotdev" ] || fail "DEV must use snapshot storage stiscalasnapshotdev, got: $ST"
            [ "$LA" = "la-iscala-archive-dev" ] || fail "DEV must use Logic App la-iscala-archive-dev, got: $LA"
            [ "$FUNC" = "fa-iscala-eg-proxy-dev" ] || fail "DEV must use Function fa-iscala-eg-proxy-dev, got: $FUNC"
            [ "$EG" = "evgd-iscala-archive-dev" ] || fail "DEV must use EventSub evgd-iscala-archive-dev, got: $EG"
            [ "$KV" = "kv-iscala-archive-dev" ] || fail "DEV must use Key Vault kv-iscala-archive-dev, got: $KV"

            echo "Snapshot storage (event source / dead-letter): $ST"
            echo "Function runtime storage is defined in infra/parameters/functionapp.dev.json"
            echo "HARD GUARDRAILS PASSED ✅"

      - task: AzureCLI@2
        displayName: Validate snapshot storage exists
        inputs:
          azureSubscription: ${{ parameters.azureServiceConnection }}
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -euo pipefail
            az storage account show -n "$(storageAccount)" -g "$(resourceGroupName)" -o none
            echo "Snapshot storage exists."

      - task: AzureResourceManagerTemplateDeployment@3
        displayName: Deploy Key Vault (dev)
        inputs:
          azureResourceManagerConnection: ${{ parameters.azureServiceConnection }}
          deploymentScope: Resource Group
          resourceGroupName: $(resourceGroupName)
          location: $(rgLocation)
          csmFile: infra/keyvault.json
          overrideParameters: >
            -keyVaultName "$(keyVaultName)"
            -location "$(rgLocation)"
            -deploymentPrincipalObjectId "$(deploymentPrincipalObjectId)"
          deploymentMode: Incremental

      - task: AzureResourceManagerTemplateDeployment@3
        displayName: Deploy Connections (dev)
        inputs:
          azureResourceManagerConnection: ${{ parameters.azureServiceConnection }}
          deploymentScope: Resource Group
          resourceGroupName: $(resourceGroupName)
          location: $(rgLocation)
          csmFile: infra/connections.json
          csmParametersFile: $(connectionsParametersFile)
          deploymentMode: Incremental

      - task: AzureResourceManagerTemplateDeployment@3
        displayName: Deploy Logic App (dev)
        inputs:
          azureResourceManagerConnection: ${{ parameters.azureServiceConnection }}
          deploymentScope: Resource Group
          resourceGroupName: $(resourceGroupName)
          location: $(rgLocation)
          csmFile: logicapp/logicapp.json
          csmParametersFile: $(logicAppParametersFile)
          deploymentMode: Incremental

      - task: AzureResourceManagerTemplateDeployment@3
        displayName: Deploy Function infra (dev)
        inputs:
          azureResourceManagerConnection: ${{ parameters.azureServiceConnection }}
          deploymentScope: Resource Group
          resourceGroupName: $(resourceGroupName)
          location: $(rgLocation)
          csmFile: infra/functionapp.json
          csmParametersFile: $(functionAppParametersFile)
          deploymentMode: Incremental
          deploymentOutputs: functionOutputs

      - script: |
          echo "##vso[task.setvariable variable=functionWebhookUrl]$(functionOutputs.functionWebhookUrl.value)"
          echo "##vso[task.setvariable variable=appInsightsName]$(functionOutputs.appInsightsName.value)"
        displayName: Set Function outputs variables

      - task: AzureCLI@2
        displayName: Grant Function access to Key Vault
        inputs:
          azureSubscription: ${{ parameters.azureServiceConnection }}
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -euo pipefail
            PRINCIPAL_ID="$(az functionapp identity show -g "$(resourceGroupName)" -n "$(functionAppName)" --query principalId -o tsv)"
            az keyvault set-policy \
              --name "$(keyVaultName)" \
              --resource-group "$(resourceGroupName)" \
              --object-id "$PRINCIPAL_ID" \
              --secret-permissions get list

      - task: AzureCLI@2
        displayName: Store Logic App callback in Key Vault -> set Function Key Vault reference
        inputs:
          azureSubscription: ${{ parameters.azureServiceConnection }}
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -euo pipefail

            RG="$(resourceGroupName)"
            LA="$(logicAppName)"
            TRIGGER="$(triggerName)"
            FUNC="$(functionAppName)"
            KV="$(keyVaultName)"
            SUB="$(az account show --query id -o tsv)"

            az functionapp show -g "$RG" -n "$FUNC" -o none
            az resource show -g "$RG" -n "$LA" --resource-type Microsoft.Logic/workflows -o none

            CALLBACK="$(az rest --method POST \
              --uri "https://management.azure.com/subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.Logic/workflows/$LA/triggers/$TRIGGER/listCallbackUrl?api-version=2019-05-01" \
              --body '{}' --query "value" -o tsv)"

            if [ -z "$CALLBACK" ] || [ "$CALLBACK" = "null" ]; then
              echo "ERROR: Could not retrieve callback URL."
              exit 1
            fi

            az keyvault secret set \
              --vault-name "$KV" \
              --name "logicapp-callback-active" \
              --value "$CALLBACK" \
              -o none

            SECRET_URI="$(az keyvault secret show \
              --vault-name "$KV" \
              --name "logicapp-callback-active" \
              --query id -o tsv)"

            az functionapp config appsettings set \
              -g "$RG" -n "$FUNC" \
              --settings \
                "LOGICAPP_CALLBACK_URL_ACTIVE=@Microsoft.KeyVault(SecretUri=$SECRET_URI)" \
                "LOGICAPP_CALLBACK_URL_NEXT=" \
              -o none

            az functionapp restart -g "$RG" -n "$FUNC" -o none

            echo "Verify Key Vault reference:"
            az functionapp config appsettings list -g "$RG" -n "$FUNC" \
              --query "[?name=='LOGICAPP_CALLBACK_URL_ACTIVE'].{name:name,value:value}" -o table

      - task: ArchiveFiles@2
        displayName: Zip Function code
        inputs:
          rootFolderOrFile: functionapp
          includeRootFolder: false
          archiveType: zip
          archiveFile: $(Build.ArtifactStagingDirectory)/functionapp.zip
          replaceExistingArchive: true

      - task: AzureCLI@2
        displayName: Deploy Function package (first-deploy retry only)
        inputs:
          azureSubscription: ${{ parameters.azureServiceConnection }}
          scriptType: bash
          scriptLocation: inlineScript
          inlineScript: |
            set -euo pipefail

            RG="$(resourceGroupName)"
            FUNC="$(functionAppName)"
            ZIP="$(Build.ArtifactStagingDirectory)/functionapp.zip"
            MARKER_NAME="ISCALA_FIRST_DEPLOY_DONE"

            MARKER_VAL="$(az functionapp config appsettings list -g "$RG" -n "$FUNC" \
              --query "[?name=='$MARKER_NAME'].value | [0]" -o tsv || true)"

            if [ -z "$MARKER_VAL" ] || [ "$MARKER_VAL" = "null" ]; then
              echo "First deployment detected -> enabling warmup + retries"
              curl -sS "https://${FUNC}.scm.azurewebsites.net/api/settings" >/dev/null || true

              max=3
              delay=5
              for i in $(seq 1 $max); do
                echo "ZIP deploy attempt $i/$max..."
                if az functionapp deployment source config-zip -g "$RG" -n "$FUNC" --src "$ZIP" -o none; then
                  echo "ZIP deploy accepted."
                  break
                fi

                if [ $i -eq $max ]; then
                  echo "ERROR: ZIP deploy failed after $max attempts."
                  echo "Tip: az webapp log deployment show -n $FUNC -g $RG -o jsonc"
                  exit 1
                fi

                echo "Retrying in ${delay}s..."
                sleep "$delay"
                delay=$((delay * 2))
              done

              az functionapp restart -g "$RG" -n "$FUNC" -o none
              az functionapp config appsettings set -g "$RG" -n "$FUNC" --settings "$MARKER_NAME=true" -o none
            else
              echo "Not first deployment (marker=$MARKER_VAL) -> single deploy"
              az functionapp deployment source config-zip -g "$RG" -n "$FUNC" --src "$ZIP" -o none
              az functionapp restart -g "$RG" -n "$FUNC" -o none
            fi

      - task: AzureResourceManagerTemplateDeployment@3
        displayName: Ensure dead-letter container exists
        inputs:
          azureResourceManagerConnection: ${{ parameters.azureServiceConnection }}
          deploymentScope: Resource Group
          resourceGroupName: $(resourceGroupName)
          location: $(rgLocation)
          csmFile: infra/deadletter-container.json
          overrideParameters: >
            -storageAccountName "$(deadLetterStorageAccountName)"
            -containerName "eventgrid-deadletter"
          deploymentMode: Incremental

      - task: AzureResourceManagerTemplateDeployment@3
        displayName: Deploy Event Grid subscription (dead-letter enabled)
        inputs:
          azureResourceManagerConnection: ${{ parameters.azureServiceConnection }}
          deploymentScope: Resource Group
          resourceGroupName: $(resourceGroupName)
          location: $(rgLocation)
          csmFile: infra/eventgrid-subscription.json
          overrideParameters: >
            -eventSubscriptionName "$(eventSubscriptionName)"
            -sourceResourceId "$(storageAccountResourceId)"
            -endpointUrl "$(functionWebhookUrl)"
            -deadLetterStorageAccountId "/subscriptions/$(subscriptionId)/resourceGroups/$(resourceGroupName)/providers/Microsoft.Storage/storageAccounts/$(deadLetterStorageAccountName)"
            -deadLetterContainerName "eventgrid-deadletter"
          deploymentMode: Incremental

  - ${{ if eq(parameters.targetEnv, 'prod') }}:
    - deployment: DeployProd
      displayName: Deploy PROD (requires approval)
      environment: iscala-archive-prod
      pool:
        name: easec-pool
      strategy:
        runOnce:
          deploy:
            steps:
            - checkout: self

            - bash: |
                set -e
                python3 -m json.tool infra/functionapp.json > /dev/null
                python3 -m json.tool infra/connections.json > /dev/null
                python3 -m json.tool infra/workbook-forwarding.json > /dev/null
                python3 -m json.tool infra/deadletter-container.json > /dev/null
                python3 -m json.tool infra/eventgrid-subscription.json > /dev/null
                python3 -m json.tool infra/keyvault.json > /dev/null
                python3 -m json.tool logicapp/logicapp.json > /dev/null
                python3 -m json.tool infra/parameters/logicapp.dev.json > /dev/null
                python3 -m json.tool infra/parameters/logicapp.prod.json > /dev/null
                python3 -m json.tool infra/parameters/functionapp.dev.json > /dev/null
                python3 -m json.tool infra/parameters/functionapp.prod.json > /dev/null
              displayName: Validate JSON templates

            - task: AzureCLI@2
              displayName: Set subscriptionId variable
              inputs:
                azureSubscription: ${{ parameters.azureServiceConnection }}
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  set -euo pipefail
                  echo "##vso[task.setvariable variable=subscriptionId]$(az account show --query id -o tsv)"

            - task: AzureCLI@2
              displayName: HARD GUARDRAILS (prod)
              inputs:
                azureSubscription: ${{ parameters.azureServiceConnection }}
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  set -euo pipefail

                  ENV="${{ parameters.targetEnv }}"
                  RG="$(resourceGroupName)"
                  LA="$(logicAppName)"
                  FUNC="$(functionAppName)"
                  ST="$(storageAccount)"
                  EG="$(eventSubscriptionName)"
                  KV="$(keyVaultName)"

                  fail() { echo "ERROR: $*" >&2; exit 1; }

                  [ "$ENV" = "prod" ] || fail "Expected targetEnv=prod, got: $ENV"
                  [ "$RG" = "rg-iscala-archive-prod" ] || fail "PROD must use RG rg-iscala-archive-prod, got: $RG"
                  [ "$ST" = "stiscalasnapshotprod" ] || fail "PROD must use snapshot storage stiscalasnapshotprod, got: $ST"
                  [ "$LA" = "la-iscala-archive-prod" ] || fail "PROD must use Logic App la-iscala-archive-prod, got: $LA"
                  [ "$FUNC" = "fa-iscala-eg-proxy-prod" ] || fail "PROD must use Function fa-iscala-eg-proxy-prod, got: $FUNC"
                  [ "$EG" = "evgd-iscala-archive-prod" ] || fail "PROD must use EventSub evgd-iscala-archive-prod, got: $EG"
                  [ "$KV" = "kv-iscala-archive-prod" ] || fail "PROD must use Key Vault kv-iscala-archive-prod, got: $KV"

                  echo "Snapshot storage (event source / dead-letter): $ST"
                  echo "Function runtime storage is defined in infra/parameters/functionapp.prod.json"
                  echo "HARD GUARDRAILS PASSED ✅"

            - task: AzureCLI@2
              displayName: Validate snapshot storage exists
              inputs:
                azureSubscription: ${{ parameters.azureServiceConnection }}
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  set -euo pipefail
                  az storage account show -n "$(storageAccount)" -g "$(resourceGroupName)" -o none
                  echo "Snapshot storage exists."

            - task: AzureResourceManagerTemplateDeployment@3
              displayName: Deploy Key Vault (prod)
              inputs:
                azureResourceManagerConnection: ${{ parameters.azureServiceConnection }}
                deploymentScope: Resource Group
                resourceGroupName: $(resourceGroupName)
                location: $(rgLocation)
                csmFile: infra/keyvault.json
                overrideParameters: >
                  -keyVaultName "$(keyVaultName)"
                  -location "$(rgLocation)"
                  -deploymentPrincipalObjectId "$(deploymentPrincipalObjectId)"
                deploymentMode: Incremental

            - task: AzureResourceManagerTemplateDeployment@3
              displayName: Deploy Connections (prod)
              inputs:
                azureResourceManagerConnection: ${{ parameters.azureServiceConnection }}
                deploymentScope: Resource Group
                resourceGroupName: $(resourceGroupName)
                location: $(rgLocation)
                csmFile: infra/connections.json
                csmParametersFile: $(connectionsParametersFile)
                deploymentMode: Incremental

            - task: AzureResourceManagerTemplateDeployment@3
              displayName: Deploy Logic App (prod)
              inputs:
                azureResourceManagerConnection: ${{ parameters.azureServiceConnection }}
                deploymentScope: Resource Group
                resourceGroupName: $(resourceGroupName)
                location: $(rgLocation)
                csmFile: logicapp/logicapp.json
                csmParametersFile: $(logicAppParametersFile)
                deploymentMode: Incremental

            - task: AzureResourceManagerTemplateDeployment@3
              displayName: Deploy Function infra (prod)
              inputs:
                azureResourceManagerConnection: ${{ parameters.azureServiceConnection }}
                deploymentScope: Resource Group
                resourceGroupName: $(resourceGroupName)
                location: $(rgLocation)
                csmFile: infra/functionapp.json
                csmParametersFile: $(functionAppParametersFile)
                deploymentMode: Incremental
                deploymentOutputs: functionOutputs

            - script: |
                echo "##vso[task.setvariable variable=functionWebhookUrl]$(functionOutputs.functionWebhookUrl.value)"
                echo "##vso[task.setvariable variable=appInsightsName]$(functionOutputs.appInsightsName.value)"
              displayName: Set Function outputs variables

            - task: AzureCLI@2
              displayName: Grant Function access to Key Vault
              inputs:
                azureSubscription: ${{ parameters.azureServiceConnection }}
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  set -euo pipefail
                  PRINCIPAL_ID="$(az functionapp identity show -g "$(resourceGroupName)" -n "$(functionAppName)" --query principalId -o tsv)"
                  az keyvault set-policy \
                    --name "$(keyVaultName)" \
                    --resource-group "$(resourceGroupName)" \
                    --object-id "$PRINCIPAL_ID" \
                    --secret-permissions get list

            - task: AzureCLI@2
              displayName: Store Logic App callback in Key Vault -> set Function Key Vault reference
              inputs:
                azureSubscription: ${{ parameters.azureServiceConnection }}
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  set -euo pipefail

                  RG="$(resourceGroupName)"
                  LA="$(logicAppName)"
                  TRIGGER="$(triggerName)"
                  FUNC="$(functionAppName)"
                  KV="$(keyVaultName)"
                  SUB="$(az account show --query id -o tsv)"

                  az functionapp show -g "$RG" -n "$FUNC" -o none
                  az resource show -g "$RG" -n "$LA" --resource-type Microsoft.Logic/workflows -o none

                  CALLBACK="$(az rest --method POST \
                    --uri "https://management.azure.com/subscriptions/$SUB/resourceGroups/$RG/providers/Microsoft.Logic/workflows/$LA/triggers/$TRIGGER/listCallbackUrl?api-version=2019-05-01" \
                    --body '{}' --query "value" -o tsv)"

                  if [ -z "$CALLBACK" ] || [ "$CALLBACK" = "null" ]; then
                    echo "ERROR: Could not retrieve callback URL."
                    exit 1
                  fi

                  az keyvault secret set \
                    --vault-name "$KV" \
                    --name "logicapp-callback-active" \
                    --value "$CALLBACK" \
                    -o none

                  SECRET_URI="$(az keyvault secret show \
                    --vault-name "$KV" \
                    --name "logicapp-callback-active" \
                    --query id -o tsv)"

                  az functionapp config appsettings set \
                    -g "$RG" -n "$FUNC" \
                    --settings \
                      "LOGICAPP_CALLBACK_URL_ACTIVE=@Microsoft.KeyVault(SecretUri=$SECRET_URI)" \
                      "LOGICAPP_CALLBACK_URL_NEXT=" \
                    -o none

                  az functionapp restart -g "$RG" -n "$FUNC" -o none

            - task: ArchiveFiles@2
              displayName: Zip Function code
              inputs:
                rootFolderOrFile: functionapp
                includeRootFolder: false
                archiveType: zip
                archiveFile: $(Build.ArtifactStagingDirectory)/functionapp.zip
                replaceExistingArchive: true

            - task: AzureCLI@2
              displayName: Deploy Function package (first-deploy retry only)
              inputs:
                azureSubscription: ${{ parameters.azureServiceConnection }}
                scriptType: bash
                scriptLocation: inlineScript
                inlineScript: |
                  set -euo pipefail

                  RG="$(resourceGroupName)"
                  FUNC="$(functionAppName)"
                  ZIP="$(Build.ArtifactStagingDirectory)/functionapp.zip"
                  MARKER_NAME="ISCALA_FIRST_DEPLOY_DONE"

                  MARKER_VAL="$(az functionapp config appsettings list -g "$RG" -n "$FUNC" \
                    --query "[?name=='$MARKER_NAME'].value | [0]" -o tsv || true)"

                  if [ -z "$MARKER_VAL" ] || [ "$MARKER_VAL" = "null" ]; then
                    echo "First deployment detected -> enabling warmup + retries"
                    curl -sS "https://${FUNC}.scm.azurewebsites.net/api/settings" >/dev/null || true

                    max=3
                    delay=5
                    for i in $(seq 1 $max); do
                      echo "ZIP deploy attempt $i/$max..."
                      if az functionapp deployment source config-zip -g "$RG" -n "$FUNC" --src "$ZIP" -o none; then
                        echo "ZIP deploy accepted."
                        break
                      fi
                      if [ $i -eq $max ]; then
                        echo "ERROR: ZIP deploy failed after $max attempts."
                        echo "Tip: az webapp log deployment show -n $FUNC -g $RG -o jsonc"
                        exit 1
                      fi
                      echo "Retrying in ${delay}s..."
                      sleep "$delay"
                      delay=$((delay * 2))
                    done

                    az functionapp restart -g "$RG" -n "$FUNC" -o none
                    az functionapp config appsettings set -g "$RG" -n "$FUNC" --settings "$MARKER_NAME=true" -o none
                  else
                    echo "Not first deployment (marker=$MARKER_VAL) -> single deploy"
                    az functionapp deployment source config-zip -g "$RG" -n "$FUNC" --src "$ZIP" -o none
                    az functionapp restart -g "$RG" -n "$FUNC" -o none
                  fi

            - task: AzureResourceManagerTemplateDeployment@3
              displayName: Ensure dead-letter container exists
              inputs:
                azureResourceManagerConnection: ${{ parameters.azureServiceConnection }}
                deploymentScope: Resource Group
                resourceGroupName: $(resourceGroupName)
                location: $(rgLocation)
                csmFile: infra/deadletter-container.json
                overrideParameters: >
                  -storageAccountName "$(deadLetterStorageAccountName)"
                  -containerName "eventgrid-deadletter"
                deploymentMode: Incremental

            - task: AzureResourceManagerTemplateDeployment@3
              displayName: Deploy Event Grid subscription (dead-letter enabled)
              inputs:
                azureResourceManagerConnection: ${{ parameters.azureServiceConnection }}
                deploymentScope: Resource Group
                resourceGroupName: $(resourceGroupName)
                location: $(rgLocation)
                csmFile: infra/eventgrid-subscription.json
                overrideParameters: >
                  -eventSubscriptionName "$(eventSubscriptionName)"
                  -sourceResourceId "$(storageAccountResourceId)"
                  -endpointUrl "$(functionWebhookUrl)"
                  -deadLetterStorageAccountId "/subscriptions/$(subscriptionId)/resourceGroups/$(resourceGroupName)/providers/Microsoft.Storage/storageAccounts/$(deadLetterStorageAccountName)"
                  -deadLetterContainerName "eventgrid-deadletter"
                deploymentMode: Incremental